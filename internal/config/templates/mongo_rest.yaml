# ==============================================================================
# REST: MONGODB
# ==============================================================================
# Файл читается только когда в rest.yaml указано mongo: enable.
# Сами модели, поля и методы описываются отдельными YAML-файлами в rest_mongo/.
version: "0.1.0"

# ------------------------------------------------------------------------------
# CONNECTION
# ------------------------------------------------------------------------------
connection:
  uri_env: MONGO_URI                 # Переменная окружения с MongoDB URI.
  database: myapp_db                 # База данных приложения.
  timeout: 10s                       # Общий timeout для подключения и операций.

# ------------------------------------------------------------------------------
# MONGO CODE GENERATION
# ------------------------------------------------------------------------------
engine: mongo-go-driver              # Сейчас планируется официальный MongoDB Go driver.
mongo:
  # Директория относительно rest_config либо абсолютный путь.
  models_path: rest_mongo

# ------------------------------------------------------------------------------
# GENERATED OUTPUT
# ------------------------------------------------------------------------------
generation:
  package: mongo
  output: internal/app/mongo
  repository_output: internal/app/repository/mongorepo
  create_indexes_on_start: true
