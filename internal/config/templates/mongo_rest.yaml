# ==============================================================================
# REST: MONGODB
# ==============================================================================
# This file is loaded only when rest.yaml contains mongo: enable.
# Models, fields, and methods are described in separate YAML files under rest_mongo/.
version: "0.1.0"

# ------------------------------------------------------------------------------
# CONNECTION
# ------------------------------------------------------------------------------
connection:
  uri_env: MONGO_URI                 # Environment variable containing the MongoDB URI.
  database: myapp_db                 # Application database.
  timeout: 10s                       # Shared timeout for connection and operations.

# ------------------------------------------------------------------------------
# MONGO CODE GENERATION
# ------------------------------------------------------------------------------
engine: mongo-go-driver              # Currently supported: official MongoDB Go driver.
mongo:
  # Directory relative to rest_config or an absolute path.
  models_path: rest_mongo

# ------------------------------------------------------------------------------
# GENERATED OUTPUT
# ------------------------------------------------------------------------------
generation:
  package: mongo
  output: internal/app/mongo
  repository_output: internal/app/repository/mongorepo
  create_indexes_on_start: true
