# ==============================================================================
# REST: SQL / SQLC
# ==============================================================================
# This file is loaded only when rest.yaml contains sql: enable.

# ------------------------------------------------------------------------------
# GENERAL SQL SETTINGS
# ------------------------------------------------------------------------------
version: "0.1.0"
database: postgresql                 # Currently supported: postgresql.

# ------------------------------------------------------------------------------
# DATABASE CONNECTION
# ------------------------------------------------------------------------------
# These values are used when generating .env.example, .env, Makefile, and init_db.sh.
# Do not store production passwords in config; provide them through environment variables after generation.
db_connection:
  db_name: myapp_db
  user_name: app_user
  user_password: app_password
  options: sslmode=disable            # Examples: sslmode=disable, sslmode=require.

# ------------------------------------------------------------------------------
# SQL CODE GENERATION
# ------------------------------------------------------------------------------
engine: sqlc                         # Currently supported: sqlc.
sqlc:
  enable: disable                    # Enable the SQLC path during rest gen.
  # Path relative to rest_config or an absolute path.
  sqlc_path: ../rest_sqlc/rest_sqlc.yaml

# ------------------------------------------------------------------------------
# MIGRATIONS
# ------------------------------------------------------------------------------
init_migration: enable               # Create an initial migration for the involved tables.
migration_engine: goose              # Currently supported: goose.
migration_output: internal/sql/migrations
