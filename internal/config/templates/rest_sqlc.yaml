# ==============================================================================
# REST: SQL / SQLC
# ==============================================================================
# Файл читается только когда в rest.yaml указано sql: enable.

# ------------------------------------------------------------------------------
# GENERAL SQL SETTINGS
# ------------------------------------------------------------------------------
version: "0.1.0"
database: postgresql                 # Сейчас поддерживается: postgresql.

# ------------------------------------------------------------------------------
# DATABASE CONNECTION
# ------------------------------------------------------------------------------
# Эти значения используются при генерации .env.example, .env, Makefile и init_db.sh.
# Не храните production-пароли в конфигурации; после генерации задавайте их через окружение.
db_connection:
  db_name: myapp_db
  user_name: app_user
  user_password: app_password
  options: sslmode=disable            # Примеры: sslmode=disable, sslmode=require.

# ------------------------------------------------------------------------------
# SQL CODE GENERATION
# ------------------------------------------------------------------------------
engine: sqlc                         # Сейчас поддерживается: sqlc.
sqlc:
  enable: disable                    # Включить SQLC-ветку при выполнении rest gen.
  rest_sqlc_example: enable          # Маркер доступности встроенного примера; режим выбирается командой rest init --example.
  # Путь относительно каталога rest_config либо абсолютный путь.
  sqlc_path: ../rest_sqlc/rest_sqlc.yaml

# ------------------------------------------------------------------------------
# MIGRATIONS
# ------------------------------------------------------------------------------
init_migration: enable               # Создавать начальную миграцию по задействованным таблицам.
migration_engine: goose              # Сейчас поддерживается: goose.
migration_output: internal/sql/migrations
