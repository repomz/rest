# ==============================================================================
# REST: AUTHENTICATION AND AUTHORIZATION
# ==============================================================================
# This file is not copied by `rest init`.
# When rest.yaml contains auth: enable, the first `rest gen` creates this file
# and appends every generated application endpoint to the endpoints list.
version: "0.1.0"                     # Version of this auth configuration format.

# ------------------------------------------------------------------------------
# USER IDENTITY
# ------------------------------------------------------------------------------
identity:                              # Maps authentication data to the generated user model.
  model: User                         # Generated Go model used as the authenticated identity.
  table: users                        # Database table that stores users.
  id_field: id                        # Field used as the unique user identifier.
  username_field: username            # Field used as login name in signup/signin requests.
  password_field: password            # Field storing the password hash.
  roles_field: roles                  # Field containing user roles for authorization.
  claims_model: User                  # Generated model used to fill UserClaims; keep User unless you need a custom claims source.

# ------------------------------------------------------------------------------
# AUTHENTICATION
# ------------------------------------------------------------------------------
authentication:                        # Selects and configures the request authentication mechanism.
  strategy: jwt                       # Active strategy: jwt or basic.

  # Used when strategy: jwt.
  jwt:                                # JWT settings; ignored when strategy is basic.
    algorithm: HS256                  # Signature algorithm for generated tokens; currently HS256.
    signing_key_env: JWT_SIGNING_KEY  # Environment variable containing the HS256 signing key.
    verification_key_file_env: JWT_VERIFICATION_KEY_FILE # Reserved for asymmetric JWT verification; leave as-is for HS256.
    issuer: myapp                     # Expected standard JWT "iss" claim; empty disables this check.
    audience: myapp-api               # Expected standard JWT "aud" claim; empty disables this check.
    access_token_ttl: 15m             # Access token lifetime used for the JWT ExpiresAt claim.
    refresh_token: false              # true also returns a refresh_token from signin.
    refresh_token_storage: context    # Where refresh tokens are expected to be stored: context or client.
    leeway: 30s                       # Allowed clock difference when checking "exp" and "nbf".
    header_name: Authorization        # HTTP header containing the token.
    token_prefix: Bearer              # Prefix before the token value in the header.

  # Used when strategy: basic. Credentials are read from environment variables.
  basic:                              # Basic Auth settings; ignored when strategy is jwt.
    username_env: BASIC_AUTH_USERNAME # Environment variable containing the expected username.
    password_env: BASIC_AUTH_PASSWORD # Environment variable containing the expected password.
    realm: Restricted                 # Realm returned in the WWW-Authenticate challenge.
    roles: []                         # Roles assigned to a successfully authenticated user.

# ------------------------------------------------------------------------------
# AUTHORIZATION
# ------------------------------------------------------------------------------
authorization:                         # Controls default access and role-based authorization.
  default_policy: deny                # Policy for endpoints absent from this file: deny or allow.
  role_claim: roles                   # JWT claim containing an array of role names.

# ------------------------------------------------------------------------------
# GENERATED ENDPOINT POLICIES
# ------------------------------------------------------------------------------
# public: true bypasses authentication.
# roles: [] permits any authenticated user; a non-empty list permits matching roles.
# Each generated item contains:
#   name: generated handler name, informational only.
#   method: HTTP method used together with path as the rule key.
#   path: full route including http.base_path.
#   public: whether unauthenticated requests are allowed.
#   require_auth: whether the selected strategy must authenticate the request.
#   roles: roles allowed after authentication.
endpoints: []                         # Generated endpoint access rules; existing rules are preserved.
