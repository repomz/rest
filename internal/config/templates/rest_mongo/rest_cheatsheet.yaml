# ==============================================================================
# REST: MONGODB CONTRACT CHEATSHEET
# ==============================================================================
# Reference contract schema. This file is not an application model.
# Create entity files next to it, for example item.yaml, order.yaml, user.yaml.
#
# One file usually describes one collection model, its embedded types,
# indexes, and custom methods. The generator reads YAML files from rest_mongo/,
# excluding system rest_*.yaml files.
#
# ------------------------------------------------------------------------------
# ENTITY FILE SHAPE
# ------------------------------------------------------------------------------
# version: "0.1.0"
#
# models:
#   - name: EntityName               # Go type name.
#     collection: entity_names       # MongoDB collection; not needed for embedded models.
#     embedded: false                # true for embedded value objects.
#     timestamps: true               # Add created_at / updated_at.
#                                    # Collection models receive standard CRUD.
#     fields:
#       - name: id
#         type: object_id            # string, bool, int32, int64, float64, time,
#                                    # object_id, decimal128, Embedded, []Type.
#         bson: _id                  # Optional when it matches name.
#         json: id                   # Optional when it matches name.
#         primary: true
#         generated: true
#
#       - name: title
#         type: string
#         required: true
#         unique: true
#         default: draft
#         enum: [draft, published]
#         write_only: true           # For example password_hash.
#         reference: User            # Simple reference to another model.
#         validation:
#           format: email            # email, uri, uuid, etc.
#           min_length: 3
#           max_length: 320
#           minimum: 0
#           min_items: 1
#
# indexes:
#   - model: EntityName
#     name: idx_entity_field
#     keys:
#       - field: title
#         order: asc                 # asc or desc.
#     unique: true
#
# methods:
#   - model: EntityName
#     name: FindByTitle
#     operation: find_one            # find_one, find_many, update_one,
#                                    # delete_one, aggregate.
#     http:
#       method: GET
#       path: /entities/by-title
#     parameters:
#       - name: title
#         type: string
#         source: query              # path, query, header, body.
#         required: true
#     filter:
#       - field: title
#         op: eq                     # eq, ne, gt, gte, lt, lte, in, nin,
#                                    # regex, exists.
#         param: title               # Or value: active for constants.
#     update:
#       set:
#         - field: status
#           param: status
#     sort:
#       - field: created_at
#         order: desc
#     pagination:
#       default_limit: 20
#       max_limit: 100
version: "0.1.0"

# This file intentionally contains only comments and version.
# Create working entity files next to it: item.yaml, user.yaml, order.yaml.
