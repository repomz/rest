version: "2"
sql:
  - engine: "postgresql"
    queries:
      - "queries"
    schema:
      - "schema"
    gen:
      go:
        package: "db"
        out: "../internal/app/db"
        emit_json_tags: true
        emit_prepared_queries: true
        emit_interface: true
        emit_exact_table_names: false
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "timestamptz"
            go_type: "time.Time"
