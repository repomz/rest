name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  commits:
    name: Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate pull request commits
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: ./scripts/check-commits.sh "$BASE_SHA" "$HEAD_SHA"

      - name: Validate pushed commits
        if: github.event_name == 'push'
        env:
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            ./scripts/check-commits.sh "$BASE_SHA" "$HEAD_SHA"
          else
            message_file="$(mktemp)"
            git show -s --format=%B "$HEAD_SHA" > "$message_file"
            ./scripts/check-commit-message.sh "$message_file"
          fi

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Test
        run: go test ./...

      - name: Build CLI
        run: go build -trimpath -ldflags="-s -w" -o bin/rest ./cmd/rest
