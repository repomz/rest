name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check
        run: make check

      - name: Build artifacts
        run: |
          mkdir -p dist
          for os in linux darwin windows; do
            for arch in amd64 arm64; do
              name="rest_${GITHUB_REF_NAME}_${os}_${arch}"
              ext=""
              if [ "$os" = "windows" ]; then ext=".exe"; fi
              mkdir -p "dist/${name}"
              GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 go build -trimpath -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" -o "dist/${name}/rest${ext}" ./cmd/rest
              if [ "$os" = "windows" ]; then
                (cd "dist/${name}" && zip "../${name}.zip" "rest${ext}")
              else
                tar -C "dist/${name}" -czf "dist/${name}.tar.gz" rest
              fi
              rm -rf "dist/${name}"
            done
          done
          (cd dist && shasum -a 256 rest_* > checksums.txt)

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign checksums
        run: cosign sign-blob --yes --output-signature dist/checksums.txt.sig --output-certificate dist/checksums.txt.pem dist/checksums.txt

      - name: Prepare release notes
        run: |
          awk -v heading="## [${GITHUB_REF_NAME}]" '
            index($0, heading) == 1 { found = 1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if ! grep -q '[^[:space:]]' release-notes.md; then
            echo "::error::CHANGELOG.md has no section for ${GITHUB_REF_NAME}"
            echo "Add a '## [${GITHUB_REF_NAME}]' section before creating the tag."
            exit 1
          fi

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --notes-file release-notes.md
