<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="560" viewBox="0 0 1400 560" role="img" aria-labelledby="title desc">
  <title id="title">Query-First REST generation flow</title>
  <desc id="desc">Database schema and named SQL queries are transformed into a typed REST application with documentation and infrastructure.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#081426"/>
      <stop offset="1" stop-color="#102b42"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#183b59"/>
      <stop offset="1" stop-color="#12536a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#33c3ff"/>
      <stop offset="1" stop-color="#39e6b0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity=".28"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#39d8d0"/>
    </marker>
  </defs>
  <rect width="1400" height="560" rx="32" fill="url(#bg)"/>
  <text x="700" y="66" text-anchor="middle" fill="#f4fbff" font-family="Inter,Arial,sans-serif" font-size="34" font-weight="700">Query-First REST Generation</text>
  <text x="700" y="102" text-anchor="middle" fill="#92b9cc" font-family="Inter,Arial,sans-serif" font-size="18">The executable data contract becomes an application skeleton</text>

  <g filter="url(#shadow)">
    <rect x="58" y="164" width="280" height="270" rx="24" fill="url(#card)" stroke="#2e7895"/>
    <text x="198" y="211" text-anchor="middle" fill="#fff" font-family="Inter,Arial,sans-serif" font-size="24" font-weight="700">Inputs</text>
    <rect x="88" y="242" width="220" height="65" rx="14" fill="#0d263d" stroke="#3b8fb3"/>
    <text x="198" y="270" text-anchor="middle" fill="#47c9ff" font-family="ui-monospace,monospace" font-size="17" font-weight="700">PostgreSQL schema</text>
    <text x="198" y="292" text-anchor="middle" fill="#a9c7d5" font-family="Inter,Arial,sans-serif" font-size="14">tables, columns, types</text>
    <rect x="88" y="327" width="220" height="76" rx="14" fill="#0d263d" stroke="#3b8fb3"/>
    <text x="198" y="356" text-anchor="middle" fill="#47c9ff" font-family="ui-monospace,monospace" font-size="17" font-weight="700">Named SQL queries</text>
    <text x="198" y="379" text-anchor="middle" fill="#a9c7d5" font-family="Inter,Arial,sans-serif" font-size="14">operations, params, results</text>
  </g>

  <path d="M355 300 C405 300 415 300 465 300" fill="none" stroke="url(#accent)" stroke-width="6" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="480" y="185" width="280" height="230" rx="115" fill="#102f48" stroke="#3adbd0" stroke-width="3"/>
    <circle cx="620" cy="300" r="78" fill="#123c54" stroke="#38d9c8" stroke-width="2"/>
    <text x="620" y="282" text-anchor="middle" fill="#fff" font-family="Inter,Arial,sans-serif" font-size="24" font-weight="700">REST</text>
    <text x="620" y="313" text-anchor="middle" fill="#fff" font-family="Inter,Arial,sans-serif" font-size="24" font-weight="700">Generator</text>
    <text x="620" y="347" text-anchor="middle" fill="#64e8ca" font-family="Inter,Arial,sans-serif" font-size="15">SQLC + conventions</text>
  </g>

  <path d="M775 300 C825 300 835 300 885 300" fill="none" stroke="url(#accent)" stroke-width="6" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="900" y="139" width="442" height="322" rx="24" fill="url(#card)" stroke="#2e7895"/>
    <text x="1121" y="184" text-anchor="middle" fill="#fff" font-family="Inter,Arial,sans-serif" font-size="24" font-weight="700">Generated application</text>
    <g font-family="Inter,Arial,sans-serif" font-size="16">
      <rect x="934" y="215" width="175" height="52" rx="12" fill="#0d263d"/><text x="1021" y="247" text-anchor="middle" fill="#d9f6ff">domain + models</text>
      <rect x="1132" y="215" width="175" height="52" rx="12" fill="#0d263d"/><text x="1219" y="247" text-anchor="middle" fill="#d9f6ff">repository</text>
      <rect x="934" y="284" width="175" height="52" rx="12" fill="#0d263d"/><text x="1021" y="316" text-anchor="middle" fill="#d9f6ff">services</text>
      <rect x="1132" y="284" width="175" height="52" rx="12" fill="#0d263d"/><text x="1219" y="316" text-anchor="middle" fill="#d9f6ff">HTTP handlers</text>
      <rect x="934" y="353" width="175" height="52" rx="12" fill="#0d263d"/><text x="1021" y="385" text-anchor="middle" fill="#d9f6ff">OpenAPI + tests</text>
      <rect x="1132" y="353" width="175" height="52" rx="12" fill="#0d263d"/><text x="1219" y="385" text-anchor="middle" fill="#d9f6ff">Docker + metrics</text>
    </g>
  </g>

  <text x="700" y="513" text-anchor="middle" fill="#f8b85c" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="700">Write queries. Get an application. Add business logic.</text>
</svg>
