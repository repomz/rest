version: "1"
endpoints:
  - table: studies
    name: GetStudiesByFilter
    method: GET
    path: /studies/search
    query: GetStudiesByDateSurgeonStudyType
    result: many
    params:
      - name: time_beginning
        source: query
        type: null_time
      - name: surgeon
        source: query
        type: null_string
      - name: study_type
        source: query
        type: null_string
  - table: studies
    name: GetStudyByPatient
    method: GET
    path: /studies/patient/{patient}
    query: GetStudyByPatient
    result: one
    params:
      - name: patient
        source: path
        type: string
        required: true
  - table: studies
    name: UpdateStudyDicomLink
    method: PATCH
    path: /studies/{id}/dicom-link
    query: UpdateStudyDicomLink
    result: one
    params:
      - name: id
        source: path
        type: uuid
        required: true
      - name: dicom_link
        source: body
        type: null_string
        required: true
